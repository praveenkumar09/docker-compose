services:
  mongo:
   image: mongo:latest
   restart: always
   environment:
     MONGO_INITDB_ROOT_USERNAME: root
     MONGO_INITDB_ROOT_PASSWORD: admin
   volumes:
     - ./data/db:/data/db
  express:
   image: mongo-express:latest
   restart: always
   ports:
     - "8081:8081"
   environment:
     ME_CONFIG_MONGODB_ADMINUSERNAME: root
     ME_CONFIG_MONGODB_ADMINPASSWORD: admin
     ME_CONFIG_MONGODB_SERVER: mongo
   depends_on:
     - mongo  