services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./src/test/resources/data:/docker-entrypoint-initdb.d
      - ./src/test/resources/data_vol:/data/db
  job-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-service
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      spring.mongodb.uri : "mongodb://job_user:job_password@mongo:27017/job"
